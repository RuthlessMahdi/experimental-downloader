name: Spotify Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🔗 Spotify Track/Playlist/Album URL'
        required: true
        type: string
      format:
        description: '🎵 Audio format'
        required: true
        default: 'mp3'
        type: choice
        options: [mp3, m4a, flac, wav, opus]
      output_pattern:
        description: '📝 Custom output template (optional, e.g., "{artist} - {title}")'
        required: false
        type: string
      branch_name:
        description: 'ℹ️ Branch name (simultaneous workflows cannot be on the same branch)'
        required: true
        default: 'music'
        type: string

jobs:
  download-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Prepare branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin

          if git ls-remote --exit-code --heads origin ${{ inputs.branch_name }}; then
            git checkout ${{ inputs.branch_name }}
            git pull origin ${{ inputs.branch_name }}
          else
            git checkout --orphan ${{ inputs.branch_name }}
            git rm -rf . || true
            mkdir -p ${{ inputs.branch_name }}
            git commit --allow-empty -m "[bot] Initialize ${{ inputs.branch_name }} branch"
            git push --set-upstream origin ${{ inputs.branch_name }}
          fi

      - name: Setup FFmpeg
        run: |
          wget https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffprobe /usr/local/bin/
          ffmpeg -version

      - name: Setup WARP
        run: |
          docker rm -f warp 2>/dev/null || true
          docker network create warp-net 2>/dev/null || true

          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp

          echo "Waiting for WARP to initialize..."

          WARP_READY=false
          for i in {1..10}; do
            RESULT=$(curl -s --max-time 3 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || true)
            
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP proxy is ready! (Took $i attempts)"
              echo "$RESULT" | grep -E "^(ip|warp|colo)="
              WARP_READY=true
              break
            fi
            
            echo "Attempt $i/10 - WARP not ready, waiting 3s..."
            sleep 3
          done

          if [ "$WARP_READY" = false ]; then
            echo "WARP failed to activate fully, continuing anyway..."
            echo "Last response: $RESULT"
          fi

      - name: Setup spotDL
        run: |
          sudo apt-get install -y python3-pip python3-venv curl python3-setuptools
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          # Add pysocks to allow Python to natively understand socks5:// URIs
          pip install spotdl pysocks
          spotdl --version

      - name: Download music
        id: download
        run: |
          source venv/bin/activate
          
          # output pattern config
          OUTPUT_PATTERN="${{ inputs.output_pattern }}"
          if [ -n "$OUTPUT_PATTERN" ]; then
              OUTPUT_OPTS="--format ${{ inputs.format }} --output ${OUTPUT_PATTERN}.{output-ext}"
          else
              OUTPUT_OPTS="--format ${{ inputs.format }}"
          fi
          
          mkdir -p tmpmusic
          cd tmpmusic
          
          # Run spotdl through the local SOCKS5 proxy managed by WARP
          # (spotDL uses yt-dlp under the hood for audio acquisition)
          spotdl download "${{ inputs.url }}" $OUTPUT_OPTS --proxy "socks5h://127.0.0.1:1080"

          # Fallback check if it's a playlist/multi-track item, grab the first file found for naming metadata
          FILE=$(ls -1 | head -n 1)
          if [ -z "$FILE" ]; then
            echo "Error: No files downloaded."
            exit 1
          fi
          
          FILE_NO_EXTENSION="${FILE%.*}"
          echo "FILE=$FILE" >> $GITHUB_ENV
          echo "FILE_NO_EXTENSION=$FILE_NO_EXTENSION" >> $GITHUB_ENV
          SAFE_NAME=$(echo "$FILE_NO_EXTENSION" | sed 's/^[[:space:]]*//' | tr ' ' '_')
          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV
          
          # zip and slice if it exceeds thresholds, just like the original pipeline structure
          mkdir -p ../music
          rm -rf tmpzip
          mkdir tmpzip
          zip -r -0 -s "45m" "tmpzip/${SAFE_NAME}.zip" "."
          mv tmpzip/* ../music/
          
      - name: Stop WARP
        run: |
          docker stop warp || true

      - name: Generate README with Download Links
        run: |
          rm -f README.md
          
          echo "# 📥 Download Links" > README.md
          echo "Generated on: $(date)" >> README.md
          echo "" >> README.md
          
          for file in music/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              encoded_filename=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "$filename")
              url="https://github.com/${{ github.repository }}/raw/${{ inputs.branch_name }}/music/$encoded_filename"
              echo "- [Download $filename]($url)" >> README.md
            fi
          done
          
      - name: Commit
        run: |
          git add README.md music
          git commit -m "[bot] Add music components ${{ env.SAFE_NAME }}"
          git push